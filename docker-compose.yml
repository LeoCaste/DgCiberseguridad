version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  miner:
    build: ./miner
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

  visualizer:
    build: ./visualizer
    ports:
      - "8501:8501"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis